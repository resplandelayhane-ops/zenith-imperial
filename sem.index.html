<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENITH IMPERIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #a07820;
            --bright: #ffeaac;
            --dim: rgba(212,175,55,0.18);
            --bg: #080705;
            --surface: #0e0c08;
            --text: #f0e8d0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.35;
        }

        .header {
            text-align: center;
            padding: 48px 20px 32px;
            border-bottom: 1px solid var(--dim);
            position: relative;
        }

        .main-title-display {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 3.6rem);
            font-weight: 900;
            background: linear-gradient(180deg, var(--bright) 0%, var(--gold) 60%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        #sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--dim);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            flex-direction: column;
        }
        #sidebar.open { transform: translateX(0); }

        .topbar {
            position: sticky;
            top: 0;
            background: rgba(8,7,5,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--dim);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 50;
        }

        .workspace {
            max-width: 740px;
            margin: 0 auto;
            padding: 32px 20px 140px;
        }

        .input-zenith {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(212,175,55,0.25);
            width: 100%;
            color: var(--text);
            padding: 12px 0;
            outline: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px;
        }

        #editor {
            min-height: 400px;
            padding: 20px 0;
            line-height: 1.8;
            font-size: 19px;
            outline: none;
            white-space: pre-wrap;
        }

        .btn-canalizar {
            background: linear-gradient(135deg, var(--bright) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            color: #000;
            font-family: 'Cinzel', serif;
            font-weight: 900;
            padding: 20px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        #toast {
            position: fixed;
            bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #111; border: 1px solid var(--gold);
            padding: 10px 20px; opacity: 0; transition: 0.3s;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding: 20px;">
        <h2 style="font-family: 'Cinzel'; color: var(--gold); font-size: 0.8rem;">BIBLIOTECA</h2>
        <button onclick="closeSidebar()" style="background:none; color:white; border:none; float:right;">✕</button>
    </div>
    <div id="book-list" style="padding: 20px;"></div>
</div>

<div class="topbar">
    <button onclick="openSidebar()" style="background:none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; cursor:pointer;">MENU</button>
    <input id="title" style="background:none; border:none; color:white; flex:1;" placeholder="Título da Obra...">
    <div id="word-counter" style="font-size: 12px; color: var(--gold-dark);">0 palavras</div>
</div>

<div class="header">
    <div class="main-title-display">ZENITH IMPERIAL</div>
</div>

<div class="workspace">
    <input id="h1" class="input-zenith" placeholder="Protagonista 1">
    <input id="h2" class="input-zenith" placeholder="Protagonista 2">
    
    <select id="pov" class="input-zenith" style="background: #000;">
        <option value="Terceira Pessoa">Terceira Pessoa</option>
        <option value="Primeira Pessoa">Primeira Pessoa</option>
    </select>
    
    <textarea id="vibe" class="input-zenith" style="height: 100px;" placeholder="O que acontece nessa cena?"></textarea>

    <div id="editor" contenteditable="true" oninput="updateWordCount()"></div>

    <button onclick="canalizar()" id="btn-run" class="btn-canalizar">⬡ Canalizar Destino</button>
</div>

<div id="toast"></div>

<script>
    // CHAVE API INSERIDA ABAIXO
    const CHAVE_API = "AIzaSyDPSE-jf-NaD2fBDGbirrvMlGN3vUKVi7w";

    function openSidebar() { document.getElementById('sidebar').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

    function updateWordCount() {
        const text = document.getElementById('editor').innerText.trim();
        const count = text ? text.split(/\s+/).length : 0;
        document.getElementById('word-counter').textContent = count + ' palavras';
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function canalizar() {
        const vibe = document.getElementById('vibe').value;
        const btn = document.getElementById('btn-run');
        
        if(!vibe) return showToast("Descreva a cena primeiro!");

        btn.disabled = true;
        btn.textContent = "CANALIZANDO...";

        const prompt = `Escreva uma cena literária épica baseada nisso: ${vibe}. Use o POV: ${document.getElementById('pov').value}.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CHAVE_API}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            const textoGerado = data.candidates[0].content.parts[0].text;
            
            document.getElementById('editor').innerText += "\n\n" + textoGerado;
            updateWordCount();
            showToast("Destino Canalizado!");
        } catch (e) {
            showToast("Erro na conexão com a API.");
        } finally {
            btn.disabled = false;
            btn.textContent = "⬡ Canalizar Destino";
        }
    }
</script>
</body>
</html>
