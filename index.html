
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações de Destino - 13/05/2026</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .input-group { margin: 15px 0; }
        input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Painel de Controle Zenith</h1>
    <p>Data atual: 13 de maio de 2026</p>
    
    <div class="input-group">
        <label for="wordCount">Quantidade de Palavras:</label>
        <input type="number" id="wordCount" value="900" placeholder="Ex: 900">
    </div>

    <button onclick="iniciar()">Canalizar Destino</button>

    <script>
        function iniciar() {
            const quantidade = document.getElementById('wordCount').value;
            alert("Iniciando canalização para: " + quantidade + " palavras. Sistema pronto (13/05/2026).");
        }
    </script>
</body>
</html>
