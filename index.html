<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZÉNITH IMPERIAL - 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ouro: #d4af37;
            --dourado-escuro: #a07820;
            --brilhante: #ffeaac;
            --dim: rgba(212, 175, 55, 0.18);
            --bg: #080705;
            --superficie: #0e0c08;
            --texto: #f0e8d0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--texto);
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        #overlay.active { display: block; }

        #sidebar {
            position: fixed;
            left: 0; top: 0;
            width: 320px; height: 100%;
            background: var(--superficie);
            border-right: 1px solid var(--dim);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        #sidebar.open { transform: translateX(0); }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-family: 'Cinzel', serif;
            color: var(--ouro);
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        .close-sidebar {
            background: none; border: none; color: var(--ouro);
            font-size: 1.5rem; cursor: pointer;
        }

        #book-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .book-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--dim);
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .book-item:hover {
            border-color: var(--ouro);
            background: rgba(212, 175, 55, 0.1);
        }

        .main-container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--ouro);
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            margin-bottom: 10px;
        }

        .sub-header {
            font-style: italic;
            color: var(--dourado-escuro);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .imperial-frame {
            background: var(--superficie);
            border: 1px solid var(--dim);
            padding: 30px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .imperial-frame::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            pointer-events: none;
        }

        textarea {
            width: 100%;
            height: 450px;
            background: transparent;
            border: none;
            color: var(--texto);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            resize: none;
            outline: none;
            padding: 10px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background: transparent;
            border: 1px solid var(--ouro);
            color: var(--ouro);
            padding: 12px 20px;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--ouro);
            color: var(--bg);
            box-shadow: 0 0 15px var(--dim);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-drawer {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 50;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        #status-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--dourado-escuro);
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <button class="btn-drawer" onclick="toggleSidebar()">📜</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Gaveta Literária</h2>
            <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
        </div>
        <div id="book-list"></div>
        <div style="padding: 20px;">
            <button onclick="newBook()" style="width: 100%;">Novo Manuscrito</button>
        </div>
    </div>

    <div class="main-container">
        <header>
            <h1>Zénith Imperial</h1>
            <div class="sub-header">Crônicas do Destino • 14 de Maio de 2026</div>
        </header>

        <div class="imperial-frame">
            <input type="text" id="book-title" placeholder="Título do Capítulo..." 
                   style="width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--dim); color: var(--ouro); font-family: 'Cinzel', serif; font-size: 1.5rem; margin-bottom: 20px; outline: none; padding: 5px;">
            
            <textarea id="editor" placeholder="Comece sua linhagem de pensamentos aqui..."></textarea>
            
            <div class="controls">
                <button onclick="saveCurrentBook()">Guardar Relíquia</button>
                <button id="ai-btn" onclick="generateAI()">Canalizar Destino</button>
                <button onclick="clearEditor()">Limpar Pergaminho</button>
            </div>
            <div id="status-msg"></div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DA CHAVE - RESTAURADA COM SUCESSO
        const CLOUDFLARE_ID = "82eab5b8d9002531a812e940c4d127cc";
        const CLOUDFLARE_API_TOKEN = "Cfut_H8KJ9w62YpysxUsjOe70VxNCNej4IT3NLdFh1EWeb9602480";
        
        let books = JSON.parse(localStorage.getItem('zenith_books') || '[]');
        let currentBookId = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
            renderBookList();
        }

        function renderBookList() {
            const list = document.getElementById('book-list');
            list.innerHTML = '';
            books.forEach(book => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `
                    <span onclick="loadBook('${book.id}')">📖 ${book.title}</span>
                    <span onclick="deleteBook('${book.id}')" style="color: #ff4444; font-weight: bold;">✕</span>
                `;
                list.appendChild(div);
            });
        }

        function saveCurrentBook() {
            const title = document.getElementById('book-title').value || 'Sem Título';
            const content = document.getElementById('editor').value;
            
            if (currentBookId) {
                const index = books.findIndex(b => b.id === currentBookId);
                books[index] = { ...books[index], title, content };
            } else {
                const newId = Date.now().toString();
                books.push({ id: newId, title, content });
                currentBookId = newId;
            }
            
            localStorage.setItem('zenith_books', JSON.stringify(books));
            showStatus("Relíquia guardada com sucesso.");
        }

        function loadBook(id) {
            const book = books.find(b => b.id === id);
            if (book) {
                document.getElementById('book-title').value = book.title;
                document.getElementById('editor').value = book.content;
                currentBookId = id;
                toggleSidebar();
            }
        }

        function deleteBook(id) {
            if(confirm("Deseja destruir este manuscrito para sempre?")) {
                books = books.filter(b => b.id !== id);
                localStorage.setItem('zenith_books', JSON.stringify(books));
                renderBookList();
            }
        }

        function newBook() {
            currentBookId = null;
            document.getElementById('book-title').value = '';
            document.getElementById('editor').value = '';
            toggleSidebar();
        }

        function clearEditor() {
            if(confirm("Limpar todo o pergaminho?")) {
                document.getElementById('editor').value = '';
            }
        }

        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.innerText = msg;
            setTimeout(() => el.innerText = '', 4000);
        }

        async function generateAI() {
            const editor = document.getElementById('editor');
            const btn = document.getElementById('ai-btn');
            const context = editor.value;

            if (!context.trim()) {
                showStatus("Escreva algo para eu poder canalizar...");
                return;
            }

            btn.disabled = true;
            showStatus("Canalizando energias imperiais...");

            try {
                const response = await fetch(
                    `https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ID}/ai/run/@cf/meta/llama-3-8b-instruct`,
                    {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${CLOUDFLARE_API_TOKEN}`,
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            messages: [
                                { role: "system", content: "Você é um escriba imperial erudito. Continue a história mantendo um tom épico, poético e sombrio." },
                                { role: "user", content: context }
                            ]
                        }),
                    }
                );

                const result = await response.json();
                
                if (result.success) {
                    const aiText = result.result.response;
                    editor.value += "\n\n" + aiText;
                    showStatus("Destino canalizado.");
                } else {
                    showStatus("Erro na Token. Verifique as permissões.");
                }
            } catch (error) {
                showStatus("Ocorreu uma falha na conexão.");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
