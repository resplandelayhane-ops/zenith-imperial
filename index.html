<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENITH IMPERIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-dark: #a07820;
            --bright: #ffeaac;
            --dim: rgba(212,175,55,0.18);
            --bg: #080705;
            --surface: #0e0c08;
            --text: #f0e8d0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Efeito de Grão Original */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.35;
        }

        .header {
            text-align: center;
            padding: 48px 20px 32px;
            border-bottom: 1px solid var(--dim);
        }

        .main-title-display {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 3.6rem);
            font-weight: 900;
            background: linear-gradient(180deg, var(--bright) 0%, var(--gold) 60%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .workspace {
            max-width: 740px;
            margin: 0 auto;
            padding: 32px 20px 140px;
        }

        .input-zenith {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(212,175,55,0.25);
            width: 100%;
            color: var(--text);
            padding: 12px 0;
            outline: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            margin-bottom: 15px;
        }

        #editor {
            min-height: 400px;
            padding: 20px 0;
            line-height: 1.9;
            font-size: 20px;
            outline: none;
            white-space: pre-wrap;
            border-top: 1px solid var(--dim);
        }

        .btn-canalizar {
            background: linear-gradient(135deg, var(--bright) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            color: #000;
            font-family: 'Cinzel', serif;
            font-weight: 900;
            padding: 22px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 20px rgba(212,175,55,0.1);
        }

        #toast {
            position: fixed;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--surface); border: 1px solid var(--gold);
            color: var(--gold); padding: 12px 25px; 
            opacity: 0; transition: 0.3s; z-index: 10000;
            font-family: 'Cinzel'; font-size: 0.7rem;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="header">
    <div class="main-title-display">ZENITH IMPERIAL</div>
</div>

<div class="workspace">
    <input id="h1" class="input-zenith" placeholder="Nome do Protagonista Principal">
    <select id="pov" class="input-zenith" style="background: #080705; color: #d4af37;">
        <option value="Terceira Pessoa do Onisciente">Terceira Pessoa (Onisciente)</option>
        <option value="Primeira Pessoa">Primeira Pessoa</option>
        <option value="Segunda Pessoa">Segunda Pessoa</option>
    </select>
    
    <textarea id="vibe" class="input-zenith" style="height: 120px; font-style: italic;" placeholder="Descreva a sinopse ou o que deve acontecer agora..."></textarea>

    <div id="editor" contenteditable="true" placeholder="O manuscrito aparecerá aqui..."></div>

    <button onclick="canalizar()" id="btn-run" class="btn-canalizar">⬡ Canalizar Destino</button>
</div>

<div id="toast"></div>

<script>
    const CHAVE_API = "AIzaSyDPSE-jf-NaD2fBDGbirrvMlGN3vUKVi7w";

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 4000);
    }

    async function canalizar() {
        const vibe = document.getElementById('vibe').value.trim();
        const btn = document.getElementById('btn-run');
        const editor = document.getElementById('editor');

        if (!vibe) {
            showToast("A MENTE ESTÁ VAZIA. DESCREVA O ATO.");
            return;
        }

        btn.disabled = true;
        btn.textContent = "CANALIZANDO OS ASTROS...";
        showToast("CONECTANDO AO COSMOS...");

        const prompt = `Atue como um escritor de alta literatura. Escreva uma cena detalhada, imersiva e poética. 
        Contexto: ${vibe}. 
        Protagonista: ${document.getElementById('h1').value || 'O herói'}.
        Ponto de Vista: ${document.getElementById('pov').value}.
        Idioma: Português Brasileiro. Escreva apenas a narrativa, sem introduções.`;

        try {
            // Usando a versão v1 estável para evitar erros de versão beta
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${CHAVE_API}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        temperature: 0.8,
                        topP: 0.95,
                        maxOutputTokens: 2048,
                    }
                })
            });

            const data = await response.json();

            if (data.error) {
                console.error("Erro da API:", data.error);
                showToast("ERRO: " + data.error.message);
            } else if (data.candidates && data.candidates[0].content) {
                const textoGerado = data.candidates[0].content.parts[0].text;
                editor.innerText += (editor.innerText ? "\n\n" : "") + textoGerado;
                showToast("DESTINO CANALIZADO COM SUCESSO.");
            } else {
                showToast("A API RESPONDEU, MAS O TEXTO FOI BLOQUEADO.");
            }

        } catch (e) {
            console.error("Erro de conexão:", e);
            showToast("FALHA NA CONEXÃO COM O ATELIÊ.");
        } finally {
            btn.disabled = false;
            btn.textContent = "⬡ Canalizar Destino";
        }
    }
</script>
</body>
</html>
