<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENITH IMPERIAL - REBORN</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond&display=swap" rel="stylesheet">
<style>
    :root { --gold: #d4af37; --bg: #080705; --text: #f0e8d0; }
    body { background: var(--bg); color: var(--text); font-family: 'Cormorant Garamond', serif; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; letter-spacing: 5px; }
    .box { border: 1px solid rgba(212,175,55,0.3); padding: 20px; margin-bottom: 20px; border-radius: 5px; }
    input, textarea, select { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 10px; margin: 10px 0; border-radius: 4px; }
    .btn { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-family: 'Cinzel'; }
    .btn-red { background: #8b0000; color: white; margin-top: 10px; }
    #editor { min-height: 300px; border: 1px solid var(--gold); padding: 20px; margin-top: 20px; white-space: pre-wrap; }
    .loading { display: none; color: var(--gold); text-align: center; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <h1>ZENITH IMPERIAL</h1>
    
    <div class="box">
        <label>Protagonistas</label>
        <input type="text" id="h1" placeholder="Nome 1">
        <input type="text" id="h2" placeholder="Nome 2">
        
        <label>Sinopse da Cena</label>
        <textarea id="vibe" placeholder="O que acontece?"></textarea>
        
        <label>Modelo de IA</label>
        <select id="modelSelect">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Rápido)</option>
            <option value="gemini-pro">Gemini Pro (Estável)</option>
        </select>
    </div>

    <div id="loading" class="loading">CANALIZANDO DESTINO... AGUARDE...</div>
    <button class="btn" onclick="canalizar()">CANALIZAR DESTINO</button>
    <button class="btn btn-red" onclick="resetKey()">TROCAR CHAVE API (RESET)</button>

    <div id="editor" contenteditable="true"></div>
</div>

<script>
function getApiKey() {
    let key = localStorage.getItem("zenith_key");
    if (!key || key === "null") {
        key = prompt("Insira sua Chave API do Google:");
        if (key) {
            key = key.trim().replace(/\s/g, '');
            localStorage.setItem("zenith_key", key);
        }
    }
    return key;
}

function resetKey() {
    localStorage.removeItem("zenith_key");
    alert("Chave removida! O site pedirá uma nova na próxima vez.");
    location.reload();
}

async function canalizar() {
    const key = getApiKey();
    if (!key) return;

    const h1 = document.getElementById('h1').value;
    const h2 = document.getElementById('h2').value;
    const vibe = document.getElementById('vibe').value;
    const model = document.getElementById('modelSelect').value;
    const loader = document.getElementById('loading');

    if (!vibe) { alert("Escreva a sinopse!"); return; }

    loader.style.display = "block";
    
    const prompt = `Escreva uma cena literária épica com os personagens ${h1} e ${h2}. Contexto: ${vibe}. Seja detalhista e use linguagem rica.`;
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const data = await response.json();

        if (data.error) {
            alert("ERRO DO GOOGLE: " + data.error.message);
        } else if (data.candidates && data.candidates[0].content) {
            const texto = data.candidates[0].content.parts[0].text;
            document.getElementById('editor').innerText += "\n\n" + texto;
        } else {
            alert("Erro desconhecido. Verifique se sua chave está ativa.");
        }
    } catch (e) {
        alert("Erro de conexão: " + e.message);
    } finally {
        loader.style.display = "none";
    }
}
</script>
</body>
</html>
